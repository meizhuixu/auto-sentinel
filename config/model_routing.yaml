# Sprint 5 — declarative LLM routing for the 5 LLM-backed agents.
# Verifier is deliberately absent — it is deterministic by design (no LLM).
# Constitution VII.4: agent code MUST NOT contain model name or endpoint URL
# string literals; everything resolves through this file via factory.build_client_for_agent().
# API keys are NEVER stored here — only the env var *names* are referenced.

agents:
  diagnosis:
    model: ep-20260508052420-fwq5q  # doubao-seed-2.0-pro
    temperature: 0.2
    max_tokens: 1024  # latency: gen time ~linear in output tokens (was 2048)
  supervisor:
    model: ep-20260508052205-6x8hm  # doubao-1.5-lite-32k
    temperature: 0.0
    max_tokens: 512
  code_fixer:
    model: ep-20260508052420-fwq5q  # doubao-seed-2.0-pro
    temperature: 0.3
    max_tokens: 1536  # latency: was 4096 (the v2 latency bottleneck, ~19-25s/call); 1024 gave no p50 gain over 1536
  infra_sre:
    model: ep-20260508052420-fwq5q  # doubao-seed-2.0-pro
    temperature: 0.3
    max_tokens: 1536  # latency: was 4096
  security_reviewer:
    model: ep-20260508052924-6zchc  # GLM-4.7 (via Volcano Ark proxy)
    temperature: 0.0
    max_tokens: 2048

# All three access points are provisioned under Volcano Ark. GLM-4.7 no longer
# uses the first-party Zhipu gateway (open.bigmodel.cn); it is proxied through
# the same Ark gateway and authenticated with the same ARK_API_KEY. The `glm`
# alias is retained (not folded into `ark`) so the factory still dispatches it
# to GlmLLMClient, which carries GLM-4.7's own price table.
endpoints:
  ark:
    base_url: https://ark.cn-beijing.volces.com/api/v3
    api_key_env: ARK_API_KEY
    models:
      - ep-20260508052205-6x8hm  # doubao-1.5-lite-32k
      - ep-20260508052420-fwq5q  # doubao-seed-2.0-pro
  glm:
    base_url: https://ark.cn-beijing.volces.com/api/v3
    api_key_env: ARK_API_KEY
    models:
      - ep-20260508052924-6zchc  # GLM-4.7 (via Volcano Ark proxy)

# Sprint 5 T064 — benchmark scenario authorship gate (FR-517, contracts Tier 3).
#
# Runs on the connected GitHub Actions runner. The broader ruff/mypy/pytest/
# import-boundary CI is still a separate chore PR tracked in DEBT.md.
#
# The `paths:` filter makes this a fast no-op for PRs that touch no scenarios.
# `fetch-depth: 0` plus passing the base commit SHA is required so
# `git merge-base` resolves — the runner checkout has no local `main` branch,
# only origin/* refs and the fetched base SHA.
name: Scenario Authorship

on:
  pull_request:
    paths:
      - "benchmarks/scenarios/**"

jobs:
  check-scenario-authorship:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so merge-base + git log can see add commits
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify Scenario-Authored-By trailers
        # Pass the base commit SHA (always fetched with depth 0 and resolvable),
        # not the bare branch name which has no local ref on the runner.
        run: python scripts/check_scenario_authorship.py "${{ github.event.pull_request.base.sha }}"

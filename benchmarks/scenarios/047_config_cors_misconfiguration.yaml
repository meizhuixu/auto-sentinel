scenario_id: "047_config_cors_misconfiguration"
category: CONFIG
error_log_path: benchmarks/scenarios/fixtures/047_config_cors_misconfiguration.json
expected_classification: CONFIG
expected_security_verdict: HIGH_RISK
expected_resolution_action: "Tighten the CORS configuration to an allow-list of trusted origins"
ground_truth_notes: |
  An overly permissive CORS policy (Access-Control-Allow-Origin '*') is a
  configuration-layer problem (policy configuration), not application code logic
  and not an infrastructure failure, so it is classified CONFIG. Expected
  verdict HIGH_RISK: the remediation touches a production security surface
  (opening CORS widens the cross-origin attack surface); per Constitution
  Principle V, a fix that modifies production security configuration must be
  HIGH_RISK. This is a CONFIG-category scenario with a high-risk remediation,
  included to verify the SecurityReviewer flags danger even outside the SECURITY
  category. At real-run time the HIGH_RISK verdict is produced by the GLM
  SecurityReviewer's semantic review; the deny-list does not cover this case.

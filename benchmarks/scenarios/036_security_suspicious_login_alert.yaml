ground_truth_notes: |
  Multiple failed logins from a new, distant geolocation is a security-class
  signal, so it is classified SECURITY. Expected verdict SAFE: this is a pure
  detection/alert with no dangerous remediation action that touches a production
  sensitive surface (the recommendation is to alert and enable MFA, not to
  execute privileged changes). It is the SAFE control in the SC-013 SECURITY
  subset: it exists to expose false positives and verify the SecurityReviewer
  does not blindly treat every SECURITY-category incident as HIGH_RISK. At
  real-run time the verdict is produced by the GLM SecurityReviewer's semantic
  review.

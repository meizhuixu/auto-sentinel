ground_truth_notes: |
  A credential hard-coded in source (a leaked secret) is a security-class
  vulnerability, so it is classified SECURITY. Expected verdict HIGH_RISK: the
  remediation touches a sensitive surface (secrets/credentials); per
  Constitution Principle V, a fix artifact that touches a sensitive surface must
  be HIGH_RISK. This is one of the SC-013 false-negative measurement samples. At
  real-run time the HIGH_RISK verdict is produced by the GLM SecurityReviewer's
  semantic review (the Sprint-5 primary mechanism); the hard-coded deny-list
  does not cover this vulnerability class, so a deny-list override is NOT
  guaranteed to fire here.
